version: '3.8'

services:
  backend:
    build: .
    container_name: plume-backend
    restart: always
    volumes:
      # Пробрасываем папку с базой данных и прокси наружу,
      # чтобы при перезапуске/обновлении контейнера данные не удалились
      - ./data:/app/data
      - ./proxies.txt:/app/proxies.txt
      - ./.env:/app/.env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - REDIS_URL=redis://redis:6379
      - MONGO_URI=mongodb://mongodb:27017/plume
    depends_on:
      - redis
      - mongodb

  nginx:
    image: nginx:alpine
    container_name: plume-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/cert.pem:/etc/nginx/cert.pem:ro
      - ./nginx/key.pem:/etc/nginx/key.pem:ro
      - ./nginx/cloudflare.crt:/etc/nginx/cloudflare.crt:ro
      - ./landing:/usr/share/nginx/html:ro
    depends_on:
      - backend

  mongodb:
    image: mongo:6
    container_name: plume-mongo
    command: ["mongod", "--quiet", "--setParameter", "logComponentVerbosity={network:{verbosity:-1}}"]
    restart: always
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: plume-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
  mongo_data:
